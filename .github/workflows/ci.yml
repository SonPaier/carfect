name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Detect which apps were changed
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      carfect: ${{ steps.filter.outputs.carfect }}
      hiservice: ${{ steps.filter.outputs.hiservice }}
      shared: ${{ steps.filter.outputs.shared }}
      edge-functions: ${{ steps.filter.outputs.edge-functions }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            carfect:
              - 'apps/carfect/**'
            hiservice:
              - 'apps/hiservice/**'
            shared:
              - 'libs/**'
            edge-functions:
              - 'supabase/functions/**'

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter carfect lint --quiet

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter carfect exec tsc --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter carfect build

  image-size:
    name: Image Size Check
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - name: Check for images larger than 300KB
        run: |
          LARGE_FILES=$(find . -type f \( -iname "*.png" -o -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.gif" -o -iname "*.webp" -o -iname "*.svg" -o -iname "*.bmp" \) -not -path "./node_modules/*" -not -path "./.git/*" -size +300k)
          if [ -n "$LARGE_FILES" ]; then
            echo "❌ Images larger than 300KB found:"
            echo "$LARGE_FILES" | while read f; do echo "  $f ($(du -k "$f" | cut -f1)KB)"; done
            echo ""
            echo "Compress images or use Supabase Storage/CDN for large assets."
            exit 1
          fi
          echo "✅ All images under 300KB"

  test-carfect:
    name: Tests — Carfect
    needs: changes
    if: needs.changes.outputs.carfect == 'true' || needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter carfect test -- --run --reporter=default --reporter=github-actions

  test-hiservice:
    name: Tests — HiService
    needs: changes
    if: needs.changes.outputs.hiservice == 'true' || needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter hiservice test -- --run --reporter=default --reporter=github-actions

  test-edge-functions:
    name: Tests — Edge Functions (Deno)
    needs: changes
    if: needs.changes.outputs.edge-functions == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno test supabase/functions/ --no-check --allow-env --allow-net --allow-read

  e2e:
    name: E2E Tests
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: pnpm install --frozen-lockfile
      - run: npx playwright install chromium
      - run: npx playwright test
        env:
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: e2e-report
          path: playwright-report/
          retention-days: 14
